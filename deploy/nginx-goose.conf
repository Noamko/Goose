# Goose dashboard — only accessible via Tailscale (not public internet)
# Listens on the Tailscale IP only; firewall blocks 443 from public interfaces.

server {
    listen TS_IP_PLACEHOLDER:443 ssl;
    server_name TS_HOSTNAME_PLACEHOLDER;

    ssl_certificate     /etc/nginx/tailscale-certs/TS_HOSTNAME_PLACEHOLDER.crt;
    ssl_certificate_key /etc/nginx/tailscale-certs/TS_HOSTNAME_PLACEHOLDER.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

# Redirect HTTP to HTTPS (Tailscale IP only)
server {
    listen TS_IP_PLACEHOLDER:80;
    server_name TS_HOSTNAME_PLACEHOLDER;
    return 301 https://$host$request_uri;
}
